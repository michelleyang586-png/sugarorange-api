<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>з Ӯзі–ж©ҳеҫҢеҸ°з®ЎзҗҶ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:"PingFang TC","Microsoft JhengHei",sans-serif;background:#F5F5F5;color:#333;max-width:540px;margin:0 auto}
.top-header{background:linear-gradient(135deg,#F97316,#FB923C);color:white;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.top-header h1{font-size:17px;font-weight:600}
.reload-btn{background:rgba(255,255,255,0.2);border:none;color:white;padding:6px 12px;border-radius:8px;font-size:13px;cursor:pointer}
.tab-bar{display:flex;background:white;border-bottom:1px solid #EEE;position:sticky;top:49px;z-index:99}
.tab{flex:1;padding:11px 4px;border:none;background:transparent;font-size:13px;color:#999;cursor:pointer;border-bottom:2px solid transparent;font-family:inherit;position:relative}
.tab.active{color:#F97316;border-bottom-color:#F97316;font-weight:500}
.badge{position:absolute;top:6px;right:10px;background:#E24B4A;color:#fff;font-size:10px;border-radius:8px;padding:1px 5px;line-height:1.4}
.section{display:none;padding:12px 14px}.section.active{display:block}
.summary-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.scard{background:white;border-radius:10px;padding:10px 12px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.scard .sl{font-size:11px;color:#999;margin-bottom:2px}
.scard .sv{font-size:20px;font-weight:600;color:#333}
.scard.hi .sv{color:#1D9E75}
.day-nav{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.day-nav button{background:white;border:1px solid #DDD;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:15px;color:#333}
.day-label{flex:1;text-align:center;font-size:15px;font-weight:500;color:#333}
.sec-hd{font-size:11px;font-weight:600;color:#999;letter-spacing:.5px;margin:12px 0 6px;padding-bottom:4px;border-bottom:1px solid #EEE}
.empty-msg{text-align:center;color:#BBB;font-size:13px;padding:20px 0}
.ocard{background:white;border-radius:12px;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.ocard.done{opacity:.45}
.ocard.no-date{border-left:3px solid #E24B4A}
.oc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.oc-name{font-size:16px;font-weight:600;color:#333}
.oc-name.crossed{text-decoration:line-through}
.oc-boxes{font-size:16px;font-weight:600;color:#333;white-space:nowrap}
.oc-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.tag{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500}
.t-pickup{background:#E1F5EE;color:#085041}
.t-delivery{background:#E6F1FB;color:#0C447C}
.t-proxy{background:#FAEEDA;color:#633806}
.t-cash{background:#EAF3DE;color:#27500A}
.t-unpaid{background:#FCEBEB;color:#791F1F}
.t-paid{background:#E1F5EE;color:#085041}
.oc-info{font-size:12px;color:#999;margin-bottom:8px;line-height:1.6}
.oc-note{font-size:12px;color:#F97316;margin-bottom:8px}
.date-row{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.date-row label{font-size:12px;color:#999;white-space:nowrap}
.qbtns{display:flex;gap:5px;flex-wrap:wrap}
.qbtn{background:#F5F5F5;border:1px solid #DDD;border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;color:#333;font-family:inherit}
.qbtn:active{background:#EEE}
.date-input{font-size:12px;border:1px solid #DDD;border-radius:6px;padding:4px 8px;color:#333;font-family:inherit;background:white}
.action-row{display:flex;gap:8px}
.btn-ship{flex:1;padding:9px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;border:1px solid #1D9E75;background:#E1F5EE;color:#085041}
.btn-ship.on{background:#F5F5F5;border-color:#DDD;color:#999}
.btn-paid{flex:1;padding:9px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;border:1px solid #BA7517;background:#FAEEDA;color:#633806}
.btn-paid.on{background:#F5F5F5;border-color:#DDD;color:#999}
.search-box{width:100%;border:1px solid #DDD;border-radius:10px;padding:10px 14px;font-size:15px;margin-bottom:12px;font-family:inherit;background:white}
.loading{text-align:center;color:#BBB;font-size:14px;padding:30px 0}
.print-area{display:none}
@media print{
  body{max-width:100%}
  .top-header,.tab-bar,.section{display:none!important}
  #print-sheet{display:block!important}
}
#print-sheet{display:none}
.print-btn-bar{padding:12px 14px 0}
.print-all-btn{width:100%;padding:11px;background:#333;color:white;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;margin-bottom:4px}
/* еҲ—еҚ°жЁЈејҸ */
#print-sheet{font-family:"PingFang TC","Microsoft JhengHei",sans-serif;padding:10px;font-size:13px}
#print-sheet h2{font-size:15px;font-weight:700;margin-bottom:4px}
#print-sheet .ps-meta{font-size:12px;color:#555;margin-bottom:10px}
#print-sheet .ps-sec{font-size:12px;font-weight:700;background:#F0F0F0;padding:4px 8px;margin:10px 0 4px}
#print-sheet table{width:100%;border-collapse:collapse;font-size:12px}
#print-sheet th{border:1px solid #999;padding:4px 6px;background:#F5F5F5;text-align:left}
#print-sheet td{border:1px solid #CCC;padding:5px 6px;vertical-align:top}
#print-sheet .chk{width:24px;text-align:center}
#print-sheet .ps-summary{display:flex;gap:16px;font-size:13px;margin-bottom:8px}
#print-sheet .ps-day{font-weight:700;font-size:13px;margin:8px 0 4px;border-bottom:1px solid #999;padding-bottom:2px}
</style>
</head>
<body>

<div class="top-header">
  <h1>рҹҚҠ з Ӯзі–ж©ҳеҫҢеҸ°з®ЎзҗҶ</h1>
  <button class="reload-btn" onclick="loadOrders()">йҮҚж–°ж•ҙзҗҶ</button>
</div>

<div class="tab-bar">
  <button class="tab active" onclick="sw('arrange',this)">еҫ…е®үжҺ’<span class="badge" id="badge-arrange" style="display:none">0</span></button>
  <button class="tab" onclick="sw('today',this)">д»Ҡж—ҘеҮәиІЁ</button>
  <button class="tab" onclick="sw('upcoming',this)">еҮәиІЁй җиҰҪ</button>
  <button class="tab" onclick="sw('search',this)">жҹҘиЁӮе–®</button>
</div>

<div class="print-btn-bar">
  <button class="print-all-btn" onclick="printAll()">рҹ–ЁпёҸ еҲ—еҚ°жүҖжңүжңӘеҮәиІЁжё…е–®</button>
</div>

<!-- еҲ—еҚ°з”ЁпјҲдёҚйЎҜзӨәеңЁиһўе№•пјү -->
<div id="print-sheet"></div>

<!-- еҫ…е®үжҺ’ -->
<div id="arrange" class="section active">
  <div id="arrange-list"><div class="loading">ијүе…Ҙдёӯ...</div></div>
</div>

<!-- д»Ҡж—ҘеҮәиІЁ -->
<div id="today" class="section">
  <div class="day-nav">
    <button onclick="chDay(-1)">вҖ№</button>
    <span class="day-label" id="today-label"></span>
    <button onclick="chDay(1)">вҖә</button>
    <button onclick="window.print()" style="background:white;border:1px solid #DDD;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:12px;color:#666">еҲ—еҚ°</button>
  </div>
  <div class="summary-row">
    <div class="scard"><div class="sl">иҮӘеҸ–</div><div class="sv" id="s-pickup">0</div></div>
    <div class="scard"><div class="sl">е®…й…Қ</div><div class="sv" id="s-delivery">0</div></div>
    <div class="scard hi"><div class="sl">еҗҲиЁҲжҺЎж”¶</div><div class="sv" id="s-total">0 зӣ’</div></div>
  </div>
  <div class="sec-hd">иҮӘеҸ–иЁӮе–®</div>
  <div id="list-pickup"></div>
  <div class="sec-hd">е®…й…ҚиЁӮе–®</div>
  <div id="list-delivery"></div>
</div>

<!-- еҮәиІЁй җиҰҪ -->
<div id="upcoming" class="section">
  <div class="sec-hd">жңӘдҫҶ7еӨ©еҮәиІЁйҮҸ</div>
  <div id="upcoming-list"></div>
</div>

<!-- жҹҘиЁӮе–® -->
<div id="search" class="section">
  <input class="search-box" type="text" id="search-input" placeholder="ијёе…Ҙе§“еҗҚжҲ–йӣ»и©ұжҗңе°Ӣ..." oninput="doSearch()">
  <div id="search-results"></div>
</div>

<script>
var API = 'https://sugarorange-api.vercel.app/api/order';
var orders = [];
var base = new Date(); base.setHours(0,0,0,0);
var viewDay = new Date(base);
var currentTab = 'arrange';

function fmt(d){ return d.toISOString().slice(0,10); }
function addD(d,n){ var r=new Date(d); r.setDate(r.getDate()+n); return r; }
function parseD(s){ if(!s) return null; var p=s.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); }
function wd(d){ return['ж—Ҙ','дёҖ','дәҢ','дёү','еӣӣ','дә”','е…ӯ'][d.getDay()]; }
function fmtDisplay(d){
  var diff=Math.round((d-base)/86400000);
  var s=(d.getMonth()+1)+'/'+d.getDate()+'пјҲ'+wd(d)+'пјү';
  if(diff===0) return s+' д»ҠеӨ©';
  if(diff===1) return s+' жҳҺеӨ©';
  if(diff===2) return s+' еҫҢеӨ©';
  if(diff===-1) return s+' жҳЁеӨ©';
  return s;
}

async function loadOrders(){
  try {
    var res = await fetch(API+'?action=getOrders');
    var data = await res.json();
    if(data.status==='success') orders = data.orders;
    renderAll();
  } catch(e) {
    document.getElementById('arrange-list').innerHTML='<div class="loading">ијүе…ҘеӨұж•—пјҢи«ӢйҮҚж–°ж•ҙзҗҶ</div>';
  }
}

function renderAll(){
  renderArrange();
  renderToday();
  renderUpcoming();
  if(currentTab==='search') doSearch();
}

function sw(id, btn){
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('active');});
  document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active');});
  btn.classList.add('active');
  document.getElementById(id).classList.add('active');
  currentTab = id;
}

function chDay(n){ viewDay=addD(viewDay,n); renderToday(); }

// в”Җв”Җ еҫ…е®үжҺ’
function renderArrange(){
  var list = orders.filter(function(o){ return !o.shipDate && o.shipStatus!=='е·ІеҮәиІЁ'; });
  var badge = document.getElementById('badge-arrange');
  if(list.length){ badge.textContent=list.length; badge.style.display=''; }
  else { badge.style.display='none'; }
  var el = document.getElementById('arrange-list');
  if(!list.length){ el.innerHTML='<div class="empty-msg">жүҖжңүиЁӮе–®йғҪе·Іе®үжҺ’еҮәиІЁж—Ҙ вң“</div>'; return; }
  el.innerHTML = list.map(function(o){ return arrangeCard(o); }).join('');
}

function arrangeCard(o){
  var tags = typeTags(o);
  var note = o.note ? '<div class="oc-note">рҹ“қ '+o.note+'</div>' : '';
  var phone = o.phone ? o.phone+' В· ' : '';
  return '<div class="ocard no-date" id="ac-'+o.rowIndex+'">'+
    '<div class="oc-top"><div class="oc-name">'+o.name+'</div><div class="oc-boxes">'+o.qty+' зӣ’</div></div>'+
    '<div class="oc-tags">'+tags+'</div>'+
    '<div class="oc-info">'+phone+o.amount+'е…ғ</div>'+
    note+
    '<div class="date-row"><label>еҮәиІЁж—Ҙ</label>'+
    '<div class="qbtns">'+
    '<button class="qbtn" onclick="setDate('+o.rowIndex+',0)">д»ҠеӨ©</button>'+
    '<button class="qbtn" onclick="setDate('+o.rowIndex+',1)">жҳҺеӨ©</button>'+
    '<button class="qbtn" onclick="setDate('+o.rowIndex+',2)">еҫҢеӨ©</button>'+
    '<input class="date-input" type="date" onchange="setDateVal('+o.rowIndex+',this.value)">'+
    '</div></div></div>';
}

async function setDate(rowIndex, n){
  var d = fmt(addD(base,n));
  await fetch(API+'?action=setShipDate&rowIndex='+rowIndex+'&shipDate='+d);
  var o = orders.find(function(x){return x.rowIndex===rowIndex;});
  if(o) o.shipDate = d;
  renderAll();
}
async function setDateVal(rowIndex, val){
  if(!val) return;
  await fetch(API+'?action=setShipDate&rowIndex='+rowIndex+'&shipDate='+val);
  var o = orders.find(function(x){return x.rowIndex===rowIndex;});
  if(o) o.shipDate = val;
  renderAll();
}

// в”Җв”Җ д»Ҡж—ҘеҮәиІЁ
function renderToday(){
  var vds = fmt(viewDay);
  document.getElementById('today-label').textContent = fmtDisplay(viewDay);
  var day = orders.filter(function(o){ return o.shipDate===vds; });
  var pu = day.filter(function(o){return o.type==='иҮӘеҸ–';});
  var de = day.filter(function(o){return o.type==='е®…й…Қ';});
  var puB = pu.reduce(function(s,o){return s+o.qty;},0);
  var deB = de.reduce(function(s,o){return s+o.qty;},0);
  document.getElementById('s-pickup').textContent = puB+' зӣ’';
  document.getElementById('s-delivery').textContent = deB+' зӣ’';
  document.getElementById('s-total').textContent = (puB+deB)+' зӣ’';
  document.getElementById('list-pickup').innerHTML = pu.length ? pu.map(todayCard).join('') : '<div class="empty-msg">д»ҠеӨ©жІ’жңүиҮӘеҸ–</div>';
  document.getElementById('list-delivery').innerHTML = de.length ? de.map(todayCard).join('') : '<div class="empty-msg">д»ҠеӨ©жІ’жңүе®…й…Қ</div>';
}

function todayCard(o){
  var done = o.shippedAt && o.paidAt;
  var tags = typeTags(o);
  var note = o.note ? '<div class="oc-note">рҹ“қ '+o.note+'</div>' : '';
  var phone = o.phone ? o.phone : '';
  return '<div class="ocard'+(done?' done':'')+'" id="tc-'+o.rowIndex+'">'+
    '<div class="oc-top"><div class="oc-name'+(done?' crossed':'')+'">'+o.name+'</div><div class="oc-boxes">'+o.qty+' зӣ’</div></div>'+
    '<div class="oc-tags">'+tags+'</div>'+
    (phone?'<div class="oc-info">'+phone+'</div>':'')+
    note+
    '<div class="action-row">'+
    '<button class="btn-ship'+(o.shippedAt?' on':'')+'" onclick="toggleShip('+o.rowIndex+')">'+(o.shippedAt?'вң“ е·ІеҮәиІЁ':'еҮәиІЁ')+'</button>'+
    '<button class="btn-paid'+(o.paidAt?' on':'')+'" onclick="togglePaid('+o.rowIndex+')">'+(o.paidAt?'вң“ е·Іж”¶ж¬ҫ':'ж”¶ж¬ҫ')+'</button>'+
    '</div>'+
    (o.type==='е®…й…Қ' ? '<button id="copy-btn-'+o.rowIndex+'" onclick="copyLabel('+o.rowIndex+')" style="width:100%;margin-top:6px;padding:7px;border-radius:8px;border:1px solid #DDD;background:#F5F5F5;color:#555;font-size:12px;cursor:pointer;font-family:inherit">рҹ“Ӣ иӨҮиЈҪеҮәиІЁжЁҷзұӨ</button>' : '')+
    '</div>';
}

async function toggleShip(rowIndex){
  var o = orders.find(function(x){return x.rowIndex===rowIndex;});
  if(!o) return;
  var undo = o.shippedAt ? '1' : '0';
  var res = await fetch(API+'?action=markShipped&rowIndex='+rowIndex+'&undo='+undo);
  var data = await res.json();
  o.shippedAt = data.shippedAt || '';
  o.shipStatus = o.shippedAt ? 'е·ІеҮәиІЁ' : 'еҫ…еҮәиІЁ';
  renderToday();
}

async function togglePaid(rowIndex){
  var o = orders.find(function(x){return x.rowIndex===rowIndex;});
  if(!o) return;
  var undo = o.paidAt ? '1' : '0';
  var res = await fetch(API+'?action=markPaid&rowIndex='+rowIndex+'&undo='+undo+'&deliveryType='+encodeURIComponent(o.type));
  var data = await res.json();
  o.paidAt = data.paidAt || '';
  o.payStatus = o.paidAt ? 'е·Іж”¶ж¬ҫ' : (o.type==='е®…й…Қ'?'еҫ…еҢҜж¬ҫ':'иІЁеҲ°д»ҳж¬ҫ');
  renderToday();
}

// в”Җв”Җ еҮәиІЁй җиҰҪ
function renderUpcoming(){
  var html = '';
  for(var i=0; i<=6; i++){
    var d = addD(base,i);
    var ds = fmt(d);
    var day = orders.filter(function(o){return o.shipDate===ds;});
    if(!day.length) continue;
    var pu = day.filter(function(o){return o.type==='иҮӘеҸ–';}).reduce(function(s,o){return s+o.qty;},0);
    var de = day.filter(function(o){return o.type==='е®…й…Қ';}).reduce(function(s,o){return s+o.qty;},0);
    html += '<div class="ocard" style="margin-bottom:8px">'+
      '<div class="oc-top">'+
      '<span style="font-size:15px;font-weight:600">'+fmtDisplay(d)+'</span>'+
      '<span style="font-size:15px;font-weight:600;color:#1D9E75">'+(pu+de)+' зӣ’</span>'+
      '</div>'+
      '<div class="oc-tags" style="margin-top:6px">'+
      '<span class="tag t-pickup">иҮӘеҸ– '+pu+' зӣ’</span>'+
      '<span class="tag t-delivery">е®…й…Қ '+de+' зӣ’</span>'+
      '</div>'+
      '<div style="font-size:12px;color:#999;margin-top:6px">'+
      day.map(function(o){return o.name+' '+o.qty+'зӣ’';}).join('гҖҖ')+
      '</div></div>';
  }
  if(!html) html = '<div class="empty-msg">жңӘдҫҶ7еӨ©жІ’жңүеҮәиІЁе®үжҺ’</div>';
  document.getElementById('upcoming-list').innerHTML = html;
}

// в”Җв”Җ жҹҘиЁӮе–®
function doSearch(){
  var q = document.getElementById('search-input').value.trim();
  var el = document.getElementById('search-results');
  if(!q){ el.innerHTML=''; return; }
  var res = orders.filter(function(o){return o.name.includes(q)||o.phone.includes(q)||o.orderId.includes(q);});
  if(!res.length){ el.innerHTML='<div class="empty-msg">жүҫдёҚеҲ°гҖҢ'+q+'гҖҚ</div>'; return; }
  el.innerHTML = res.map(function(o){
    var tags = typeTags(o);
    var note = o.note?'<div class="oc-note">рҹ“қ '+o.note+'</div>':'';
    return '<div class="ocard">'+
      '<div class="oc-top"><div class="oc-name">'+o.name+'</div><div class="oc-boxes">'+o.qty+' зӣ’</div></div>'+
      '<div class="oc-tags">'+tags+'</div>'+
      '<div class="oc-info">'+(o.phone?o.phone+' В· ':'')+o.amount+'е…ғ В· '+(o.shipDate?fmtDisplay(parseD(o.shipDate)):'е°ҡжңӘе®үжҺ’еҮәиІЁж—Ҙ')+'</div>'+
      note+
      '<div class="oc-info" style="margin-top:4px">'+
      (o.shippedAt?'рҹҹ  е·ІеҮәиІЁ '+o.shippedAt:'рҹ”І жңӘеҮәиІЁ')+' &nbsp; '+
      (o.paidAt?'рҹҹў е·Іж”¶ж¬ҫ '+o.paidAt:'рҹ”І жңӘж”¶ж¬ҫ')+
      '</div></div>';
  }).join('');
}

function copyLabel(rowIndex){
  var o = orders.find(function(x){return x.rowIndex===rowIndex;});
  if(!o) return;
  var d = o.shipDate ? (function(){
    var p=o.shipDate.split('-');
    var dt=new Date(+p[0],+p[1]-1,+p[2]);
    return (dt.getMonth()+1)+'/'+dt.getDate();
  })() : 'еҫ…е®үжҺ’';
  var sep = '--------------';
  var lines = [
    'йӨҳжңүжҰ®з„ү з Ӯзі–ж©ҳ',
    sep,
    'ж”¶пјҡ' + o.name,
    'йӣ»и©ұпјҡ' + (o.phone || 'вҖ”'),
    'ең°еқҖпјҡ' + o.address,
    'ж•ёйҮҸпјҡ' + o.qty + ' зӣ’пјҲ5ж–ӨиЈқпјү',
    'е–®иҷҹпјҡ' + o.orderId,
    'еҮәиІЁж—Ҙпјҡ' + d,
    sep,
    'еҜ„пјҡи¬қе°Ҹе§җ 0937-331355',
    'иӢ—ж —зёЈе…¬йӨЁй„үйӨЁжқұжқ‘е’ҢжқұиЎ—46иҷҹ'
  ];
  var text = lines.join('\n');
  navigator.clipboard.writeText(text).then(function(){
    var btn = document.getElementById('copy-btn-'+rowIndex);
    var orig = btn.textContent;
    btn.textContent = 'вң“ е·ІиӨҮиЈҪпјҒ';
    btn.style.background = '#1D9E75';
    btn.style.color = 'white';
    setTimeout(function(){ btn.textContent=orig; btn.style.background=''; btn.style.color=''; }, 2000);
  }).catch(function(){
    alert(text);
  });
}

function typeTags(o){
  var t = '<span class="tag '+(o.type==='иҮӘеҸ–'?'t-pickup':'t-delivery')+'">'+(o.type==='иҮӘеҸ–'?'рҹҸӘ иҮӘеҸ–':'рҹҡӣ е®…й…Қ')+'</span>';
  if(o.payStatus==='е·Іж”¶ж¬ҫ') t+=' <span class="tag t-paid">е·Іж”¶ж¬ҫ</span>';
  else if(o.payStatus==='еҫ…еҢҜж¬ҫ') t+=' <span class="tag t-unpaid">еҫ…еҢҜж¬ҫ</span>';
  else if(o.type==='иҮӘеҸ–') t+=' <span class="tag t-cash">зҸҫе ҙж”¶ж¬ҫ</span>';
  return t;
}

function printAll(){
  var unshipped = orders.filter(function(o){ return !o.shippedAt; });
  if(!unshipped.length){ alert('зӣ®еүҚжІ’жңүжңӘеҮәиІЁиЁӮе–®пјҒ'); return; }

  // дҫқй җиЁҲеҮәиІЁж—ҘжҺ’еәҸпјҲз„Ўж—ҘжңҹжҺ’жңҖеҫҢпјү
  unshipped.sort(function(a,b){
    if(!a.shipDate && !b.shipDate) return 0;
    if(!a.shipDate) return 1;
    if(!b.shipDate) return -1;
    return a.shipDate.localeCompare(b.shipDate);
  });

  var now = new Date().toLocaleString('zh-TW',{timeZone:'Asia/Taipei'});
  var total = unshipped.reduce(function(s,o){return s+o.qty;},0);
  var puTotal = unshipped.filter(function(o){return o.type==='иҮӘеҸ–';}).reduce(function(s,o){return s+o.qty;},0);
  var deTotal = unshipped.filter(function(o){return o.type==='е®…й…Қ';}).reduce(function(s,o){return s+o.qty;},0);

  // дҫқж—ҘжңҹеҲҶзө„
  var groups = {};
  var noDate = [];
  unshipped.forEach(function(o){
    if(!o.shipDate){ noDate.push(o); return; }
    if(!groups[o.shipDate]) groups[o.shipDate] = [];
    groups[o.shipDate].push(o);
  });

  function tableRows(list){
    return list.map(function(o){
      return '<tr>'+
        '<td class="chk">вҳҗ</td>'+
        '<td><b>'+o.name+'</b>'+(o.phone?'<br><span style="font-size:11px;color:#666">'+o.phone+'</span>':'')+'</td>'+
        '<td style="text-align:center"><b>'+o.qty+'</b></td>'+
        '<td>'+(o.payStatus||'')+'</td>'+
        '<td>'+(o.note||'')+'</td>'+
        '<td class="chk">вҳҗ</td>'+
        '</tr>';
    }).join('');
  }

  function section(list, label){
    var pu = list.filter(function(o){return o.type==='иҮӘеҸ–';});
    var de = list.filter(function(o){return o.type==='е®…й…Қ';});
    var html = '<div class="ps-day">'+label+'гҖҖе…ұ '+list.reduce(function(s,o){return s+o.qty;},0)+' зӣ’пјҲиҮӘеҸ–'+pu.reduce(function(s,o){return s+o.qty;},0)+'пјҸе®…й…Қ'+de.reduce(function(s,o){return s+o.qty;},0)+'пјү</div>';
    if(pu.length){
      html += '<div style="font-size:11px;font-weight:600;margin:4px 0 2px;color:#085041">в–ё иҮӘеҸ–</div>';
      html += '<table><tr><th class="chk">еҮә</th><th>е§“еҗҚ</th><th>зӣ’ж•ё</th><th>ж”¶ж¬ҫ</th><th>еӮҷиЁ»</th><th class="chk">ж”¶</th></tr>'+tableRows(pu)+'</table>';
    }
    if(de.length){
      html += '<div style="font-size:11px;font-weight:600;margin:6px 0 2px;color:#0C447C">в–ё е®…й…Қ</div>';
      html += '<table><tr><th class="chk">еҮә</th><th>е§“еҗҚ</th><th>зӣ’ж•ё</th><th>ж”¶ж¬ҫ</th><th>еӮҷиЁ»</th><th class="chk">ж”¶</th></tr>'+tableRows(de)+'</table>';
    }
    return html;
  }

  var body = '';
  // дҫқж—ҘжңҹжҺ’еәҸзҡ„зҫӨзө„
  Object.keys(groups).sort().forEach(function(ds){
    var d = new Date(ds+'T00:00:00');
    var wd2 = ['ж—Ҙ','дёҖ','дәҢ','дёү','еӣӣ','дә”','е…ӯ'][d.getDay()];
    var lbl = (d.getMonth()+1)+'/'+d.getDate()+'пјҲ'+wd2+'пјү';
    body += section(groups[ds], 'рҹ“… '+lbl);
  });
  // жңӘе®үжҺ’
  if(noDate.length){
    body += section(noDate, 'вҡ пёҸ е°ҡжңӘе®үжҺ’еҮәиІЁж—Ҙ');
  }

  document.getElementById('print-sheet').innerHTML =
    '<h2>рҹҚҠ з Ӯзі–ж©ҳжңӘеҮәиІЁжё…е–®</h2>'+
    '<div class="ps-meta">еҲ—еҚ°жҷӮй–“пјҡ'+now+'гҖҖе…ұ '+unshipped.length+' зӯҶгҖҖ'+total+' зӣ’пјҲиҮӘеҸ–'+puTotal+'пјҸе®…й…Қ'+deTotal+'пјү</div>'+
    body;

  window.print();
}

loadOrders();
</script>
