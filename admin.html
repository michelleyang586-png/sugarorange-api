<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>砂糖橘後台管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:"PingFang TC","Microsoft JhengHei",sans-serif;background:#F5F5F5;color:#333;max-width:540px;margin:0 auto}
.top-header{background:linear-gradient(135deg,#F97316,#FB923C);color:white;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.top-header h1{font-size:20px;font-weight:600}
.reload-btn{background:rgba(255,255,255,0.2);border:none;color:white;padding:10px 16px;border-radius:8px;font-size:15px;cursor:pointer}
.tab-bar{display:flex;background:white;border-bottom:1px solid #EEE;position:sticky;top:49px;z-index:99}
.tab{flex:1;padding:16px 2px;border:none;background:transparent;font-size:15px;color:#999;cursor:pointer;border-bottom:3px solid transparent;font-family:inherit;position:relative}
.tab.active{color:#F97316;border-bottom-color:#F97316;font-weight:500}
.badge{position:absolute;top:8px;right:6px;background:#E24B4A;color:#fff;font-size:12px;border-radius:8px;padding:2px 7px;line-height:1.4}
.section{display:none;padding:12px 14px}.section.active{display:block}
.summary-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.scard{background:white;border-radius:10px;padding:14px 12px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.scard .sl{font-size:14px;color:#999;margin-bottom:4px}
.scard .sv{font-size:26px;font-weight:700;color:#333}
.scard.hi .sv{color:#1D9E75}
.day-nav{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.day-nav button{background:white;border:1px solid #DDD;border-radius:8px;padding:12px 18px;cursor:pointer;font-size:19px;color:#333;font-weight:600}
.day-label{flex:1;text-align:center;font-size:18px;font-weight:600;color:#333}
.sec-hd{font-size:14px;font-weight:700;color:#888;letter-spacing:.5px;margin:14px 0 8px;padding-bottom:5px;border-bottom:1px solid #EEE}
.empty-msg{text-align:center;color:#BBB;font-size:16px;padding:24px 0}
.ocard{background:white;border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.ocard.done{opacity:.45}
.ocard.no-date{border-left:3px solid #E24B4A}
.ocard.big-order{border-left:4px solid #9333EA}
.ocard.no-date.big-order{border-left:4px solid #9333EA;border-image:linear-gradient(to bottom,#9333EA 0%,#9333EA 50%,#E24B4A 50%,#E24B4A 100%) 1}
.tag-big{background:#F3E8FF;color:#6B21A8}
.oc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.oc-name{font-size:22px;font-weight:700;color:#333}
.oc-name.crossed{text-decoration:line-through}
.oc-id{font-size:13px;color:#BBB;margin-bottom:6px;font-family:monospace}
.oc-boxes{font-size:22px;font-weight:700;color:#333;white-space:nowrap}
.oc-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.tag{font-size:14px;padding:5px 12px;border-radius:12px;font-weight:600}
.t-pickup{background:#E1F5EE;color:#085041}
.t-delivery{background:#E6F1FB;color:#0C447C}
.t-proxy{background:#FAEEDA;color:#633806}
.t-cash{background:#EAF3DE;color:#27500A}
.t-unpaid{background:#FCEBEB;color:#791F1F}
.t-paid{background:#E1F5EE;color:#085041}
.t-wholesale{background:#FAEEDA;color:#633806}
.oc-info{font-size:15px;color:#888;margin-bottom:10px;line-height:1.6}
.oc-note{font-size:15px;color:#F97316;margin-bottom:10px;font-weight:500}
.date-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.date-row label{font-size:16px;color:#666;white-space:nowrap;font-weight:600}
.qbtns{display:flex;gap:10px;flex-wrap:wrap}
.qbtn{background:#F5F5F5;border:1px solid #DDD;border-radius:10px;padding:14px 20px;font-size:18px;cursor:pointer;color:#333;font-family:inherit;font-weight:600;min-height:50px}
.qbtn:active{background:#EEE}
.date-input{font-size:18px;border:1px solid #DDD;border-radius:10px;padding:12px 14px;color:#333;font-family:inherit;background:white;min-height:50px}
.date-confirm-btn{background:#FFF7ED;border:2px solid #F97316;color:#EA580C;border-radius:10px;padding:14px 20px;font-size:18px;cursor:pointer;font-family:inherit;font-weight:700;min-height:50px}
.action-row{display:flex;gap:12px;margin-top:4px}
.btn-ship{flex:1;padding:16px 8px;border-radius:10px;font-size:18px;font-weight:700;cursor:pointer;font-family:inherit;border:2px solid #1D9E75;background:#E1F5EE;color:#085041;min-height:56px}
.btn-ship.on{background:#F5F5F5;border-color:#DDD;color:#999}
.btn-paid{flex:1;padding:16px 8px;border-radius:10px;font-size:18px;font-weight:700;cursor:pointer;font-family:inherit;border:2px solid #BA7517;background:#FAEEDA;color:#633806;min-height:56px}
.btn-paid.on{background:#F5F5F5;border-color:#DDD;color:#999}
.search-box{width:100%;border:1px solid #DDD;border-radius:10px;padding:14px 16px;font-size:17px;margin-bottom:14px;font-family:inherit;background:white}
.filter-btn{border:1px solid #DDD;background:#F5F5F5;border-radius:20px;padding:10px 16px;font-size:15px;cursor:pointer;color:#666;font-family:inherit;transition:all .15s;font-weight:600;min-height:44px}
.filter-btn.active{background:#F97316;border-color:#F97316;color:white;font-weight:500}
.unpaid-summary{display:flex;justify-content:space-between;align-items:center;background:#FCEBEB;border:1px solid #F5B5B5;border-radius:10px;padding:14px 16px;margin-bottom:14px;font-size:15px;color:#791F1F}
.unpaid-summary.none{background:#E1F5EE;border-color:#A7E0CC;color:#085041}
.unpaid-summary b{font-size:19px}
.unpaid-summary .us-stats{display:flex;gap:14px;flex-wrap:wrap}
.batch-bar{display:flex;gap:6px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.batch-btn{border:1px solid #DDD;background:white;border-radius:10px;padding:12px 14px;font-size:15px;cursor:pointer;color:#555;font-family:inherit;font-weight:600;min-height:46px}
.batch-btn.batch-ship{border-color:#1D9E75;background:#E1F5EE;color:#085041}
.batch-btn.batch-paid{border-color:#BA7517;background:#FAEEDA;color:#633806}
.batch-btn:disabled{opacity:.4;cursor:not-allowed}
.batch-count{font-size:14px;color:#999;margin-left:auto;font-weight:600}
.big-overview{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.big-item{background:white;border-radius:12px;padding:16px 8px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.big-item.highlight{background:linear-gradient(135deg,#FFF7ED,#FFEDD5);border:1px solid #FDBA74}
.big-label{font-size:14px;color:#888;margin-bottom:6px;font-weight:500}
.big-value{font-size:34px;font-weight:700;color:#333;line-height:1.1}
.big-item.highlight .big-value{color:#EA580C}
.big-value.over{color:#E24B4A}
.big-unit{font-size:16px;font-weight:500}
.limit-row{display:flex;align-items:center;gap:8px;font-size:15px;color:#777;margin-bottom:16px;flex-wrap:wrap}
.limit-row input{width:90px;border:1px solid #DDD;border-radius:8px;padding:8px 10px;font-size:16px;font-family:inherit}
.limit-edit-btn,.limit-save-btn{border:1px solid #DDD;background:#F5F5F5;border-radius:8px;padding:8px 14px;font-size:14px;cursor:pointer;color:#666;font-family:inherit;font-weight:600}
.limit-save-btn{border-color:#F97316;background:#FFF7ED;color:#EA580C}

/* 統計分頁 */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.stat-card{background:white;border-radius:12px;padding:14px 12px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.stat-card .si{font-size:24px;margin-bottom:6px}
.stat-card .sv2{font-size:28px;font-weight:700;color:#333;line-height:1.2}
.stat-card .sl2{font-size:14px;color:#999;margin-top:4px}
.stat-card.paid .sv2{color:#1D9E75}
.stat-card.unpaid .sv2{color:#E24B4A}
.stat-block{background:white;border-radius:12px;padding:12px 14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.stat-line{display:flex;justify-content:space-between;align-items:center;font-size:15px;color:#555;margin-bottom:6px}
.stat-line b{font-size:17px;color:#333}
.progress-bar{height:8px;background:#F0F0F0;border-radius:4px;overflow:hidden;margin:6px 0 10px}
.progress-fill{height:100%;background:#1D9E75;border-radius:4px;transition:width .3s}
.progress-fill.delivery{background:#0C447C}
.stat-sub{font-size:13px;color:#AAA;margin-top:4px}
.oc-chk{display:flex;align-items:flex-start;gap:14px}
.oc-chk input[type=checkbox]{width:30px;height:30px;margin-top:2px;flex-shrink:0;accent-color:#F97316}
.oc-body{flex:1;min-width:0}
.loading{text-align:center;color:#BBB;font-size:16px;padding:30px 0}
.print-area{display:none}
@media print{
  @page{ size:A4 landscape; margin:10mm; }
  body{max-width:100%}
  .top-header,.tab-bar,.section,.print-btn-bar{display:none!important}
  #print-sheet{display:block!important}
}
#print-sheet{display:none}
.print-btn-bar{padding:12px 14px 0}
.print-all-btn{width:100%;padding:16px;background:#333;color:white;border:none;border-radius:10px;font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:4px;min-height:54px}
/* 列印樣式 */
#print-sheet{font-family:"PingFang TC","Microsoft JhengHei",sans-serif;padding:10px;font-size:16px}
#print-sheet h2{font-size:18px;font-weight:700;margin-bottom:4px}
#print-sheet .ps-meta{font-size:13px;color:#555;margin-bottom:10px}
#print-sheet table{width:100%;border-collapse:collapse;font-size:15px}
#print-sheet th{border:1px solid #999;padding:6px 8px;background:#F0F0F0;text-align:left;font-size:14px}
#print-sheet td{border:1px solid #CCC;padding:7px 8px;vertical-align:top}
#print-sheet .chk{width:28px;text-align:center}
#print-sheet .ps-day{font-weight:700;font-size:16px;margin:12px 0 5px;border-bottom:2px solid #999;padding-bottom:3px}
#print-sheet .ps-type{font-size:13px;font-weight:600;margin:6px 0 3px;color:#555}
#print-sheet .n2{font-size:13px;color:#666;margin-top:2px}
</style>
</head>
<body>

<div class="top-header">
  <h1>🍊 砂糖橘後台管理</h1>
  <button class="reload-btn" onclick="loadOrders()">重新整理</button>
</div>

<div class="tab-bar">
  <button class="tab active" onclick="sw('arrange',this)">待安排<span class="badge" id="badge-arrange" style="display:none">0</span></button>
  <button class="tab" onclick="sw('today',this)">今日出貨</button>
  <button class="tab" onclick="sw('upcoming',this)">出貨預覽</button>
  <button class="tab" onclick="sw('search',this)">查訂單</button>
  <button class="tab" onclick="sw('stats',this)">統計</button>
</div>

<div class="print-btn-bar">
  <button class="print-all-btn" onclick="printAll()">🖨️ 列印所有未出貨清單</button>
</div>

<!-- 列印用（不顯示在螢幕） -->
<div id="print-sheet"></div>

<!-- 待安排 -->
<div id="arrange" class="section active">
  <div style="display:flex;gap:6px;margin-bottom:10px">
    <button class="filter-btn active" data-group="arrange-type" onclick="setArrangeTypeFilter('all',this)">全部</button>
    <button class="filter-btn" data-group="arrange-type" onclick="setArrangeTypeFilter('自取',this)">🏪 自取</button>
    <button class="filter-btn" data-group="arrange-type" onclick="setArrangeTypeFilter('宅配',this)">🚛 宅配</button>
  </div>
  <div id="arrange-list"><div class="loading">載入中...</div></div>
</div>

<!-- 今日出貨 -->
<div id="today" class="section">
  <div class="big-overview">
    <div class="big-item">
      <div class="big-label">今天要出</div>
      <div class="big-value" id="big-today">0<span class="big-unit">盒</span></div>
    </div>
    <div class="big-item">
      <div class="big-label">明天預計</div>
      <div class="big-value" id="big-tomorrow">0<span class="big-unit">盒</span></div>
    </div>
    <div class="big-item highlight">
      <div class="big-label">還可再接</div>
      <div class="big-value" id="big-remain">0<span class="big-unit">盒</span></div>
    </div>
  </div>
  <div class="limit-row" id="limit-row">
    <span>今日採收上限：<b id="limit-display">—</b> 盒</span>
    <button class="limit-edit-btn" id="limit-edit-btn" onclick="editStockLimit()">✏️ 編輯</button>
  </div>
  <div class="day-nav">
    <button onclick="chDay(-1)">‹</button>
    <span class="day-label" id="today-label"></span>
    <button onclick="chDay(1)">›</button>
    <button onclick="window.print()" style="background:white;border:1px solid #DDD;border-radius:8px;padding:10px 14px;cursor:pointer;font-size:14px;color:#666;font-weight:600">列印</button>
  </div>
  <div style="display:flex;gap:6px;margin-bottom:10px">
    <button class="filter-btn active" data-group="today-type" onclick="setTodayTypeFilter('all',this)">全部</button>
    <button class="filter-btn" data-group="today-type" onclick="setTodayTypeFilter('自取',this)">🏪 自取</button>
    <button class="filter-btn" data-group="today-type" onclick="setTodayTypeFilter('宅配',this)">🚛 宅配</button>
  </div>
  <div class="summary-row">
    <div class="scard"><div class="sl">自取</div><div class="sv" id="s-pickup">0</div></div>
    <div class="scard"><div class="sl">宅配</div><div class="sv" id="s-delivery">0</div></div>
    <div class="scard hi"><div class="sl">合計採收</div><div class="sv" id="s-total">0 盒</div></div>
  </div>
  <div class="batch-bar">
    <button class="batch-btn" id="select-all-btn" onclick="toggleSelectAll()">☐ 全選</button>
    <button class="batch-btn batch-ship" id="batch-ship-btn" onclick="batchMarkShipped()" disabled>📦 已選標記出貨</button>
    <button class="batch-btn batch-paid" id="batch-paid-btn" onclick="batchMarkPaid()" disabled>💰 已選標記收款</button>
    <span class="batch-count" id="batch-count"></span>
  </div>
  <div class="sec-hd" id="sec-pickup-hd">自取訂單</div>
  <div id="list-pickup"></div>
  <div class="sec-hd" id="sec-delivery-hd">宅配訂單</div>
  <div id="list-delivery"></div>
</div>

<!-- 出貨預覽 -->
<div id="upcoming" class="section">
  <div class="sec-hd">未來7天出貨量</div>
  <div id="upcoming-list"></div>
</div>

<!-- 查訂單 -->
<div id="search" class="section">
  <input class="search-box" type="text" id="search-input" placeholder="輸入姓名或電話搜尋..." oninput="doSearch()">
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
    <button class="filter-btn active" onclick="setFilter('pay','all',this)" data-group="pay">💰 全部</button>
    <button class="filter-btn" onclick="setFilter('pay','待匯款',this)" data-group="pay">待匯款</button>
    <button class="filter-btn" onclick="setFilter('pay','已收款',this)" data-group="pay">已收款</button>
    <div style="width:1px;background:#EEE;margin:0 2px"></div>
    <button class="filter-btn active" onclick="setFilter('ship','all',this)" data-group="ship">📦 全部</button>
    <button class="filter-btn" onclick="setFilter('ship','待出貨',this)" data-group="ship">待出貨</button>
    <button class="filter-btn" onclick="setFilter('ship','已出貨',this)" data-group="ship">已出貨</button>
  </div>
  <div id="unpaid-summary"></div>
  <div id="search-results"></div>
</div>

<!-- 統計 -->
<div id="stats" class="section">
  <div class="stat-grid">
    <div class="stat-card">
      <div class="si">📋</div>
      <div class="sv2" id="st-order-count">0</div>
      <div class="sl2">總訂單數</div>
    </div>
    <div class="stat-card">
      <div class="si">🍊</div>
      <div class="sv2" id="st-total-boxes">0</div>
      <div class="sl2">總接單盒數</div>
    </div>
  </div>

  <div class="sec-hd">出貨進度</div>
  <div class="stat-block">
    <div class="stat-line"><span>已出貨</span><b id="st-shipped-boxes">0 盒</b></div>
    <div class="progress-bar"><div class="progress-fill" id="st-ship-fill" style="width:0%"></div></div>
    <div class="stat-line"><span>待出貨</span><b id="st-unshipped-boxes">0 盒</b></div>
    <div class="stat-sub" id="st-ship-sub"></div>
  </div>

  <div class="sec-hd">收款狀況</div>
  <div class="stat-grid">
    <div class="stat-card paid">
      <div class="si">🟢</div>
      <div class="sv2" id="st-paid-amount">NT$0</div>
      <div class="sl2">已收金額</div>
    </div>
    <div class="stat-card unpaid">
      <div class="si">🔴</div>
      <div class="sv2" id="st-unpaid-amount">NT$0</div>
      <div class="sl2">待收金額</div>
    </div>
  </div>
  <div class="stat-block">
    <div class="progress-bar"><div class="progress-fill" id="st-paid-fill" style="width:0%"></div></div>
    <div class="stat-sub" id="st-paid-sub"></div>
  </div>

  <div class="sec-hd">取貨方式</div>
  <div class="stat-block">
    <div class="stat-line"><span>🏪 自取</span><b id="st-pickup">0 筆 / 0 盒</b></div>
    <div class="progress-bar"><div class="progress-fill" id="st-pickup-fill" style="width:0%"></div></div>
    <div class="stat-line"><span>🚛 宅配</span><b id="st-delivery">0 筆 / 0 盒</b></div>
    <div class="progress-bar"><div class="progress-fill delivery" id="st-delivery-fill" style="width:0%"></div></div>
  </div>

  <div class="sec-hd">季節庫存</div>
  <div class="stat-block">
    <div class="stat-line"><span>總庫存</span><b id="st-stock-total">0 盒</b></div>
    <div class="stat-line"><span>已售出</span><b id="st-stock-sold">0 盒</b></div>
    <div class="stat-line"><span>剩餘可訂</span><b id="st-stock-remain">0 盒</b></div>
    <div class="progress-bar"><div class="progress-fill" id="st-stock-fill" style="width:0%"></div></div>
  </div>
</div>

<script>
var API = 'https://sugarorange-api.vercel.app/api/order';
var orders = [];
var stockLimit = 0;
var totalStock = 0, soldStock = 0, remainStock = 0;
var base = new Date(); base.setHours(0,0,0,0);
var viewDay = new Date(base);
var currentTab = 'arrange';

function fmt(d){ return d.toISOString().slice(0,10); }
function addD(d,n){ var r=new Date(d); r.setDate(r.getDate()+n); return r; }
function parseD(s){ if(!s) return null; var p=s.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); }
function wd(d){ return['日','一','二','三','四','五','六'][d.getDay()]; }
function fmtDisplay(d){
  var diff=Math.round((d-base)/86400000);
  var s=(d.getMonth()+1)+'/'+d.getDate()+'（'+wd(d)+'）';
  if(diff===0) return s+' 今天';
  if(diff===1) return s+' 明天';
  if(diff===2) return s+' 後天';
  if(diff===-1) return s+' 昨天';
  return s;
}

async function loadOrders(){
  try {
    var res = await fetch(API+'?action=getOrders');
    var data = await res.json();
    if(data.status==='success'){
      orders = data.orders;
      stockLimit = data.stockLimit || 0;
      totalStock = data.totalStock || 0;
      soldStock = data.soldStock || 0;
      remainStock = data.remainStock || 0;
    }
    renderAll();
  } catch(e) {
    document.getElementById('arrange-list').innerHTML='<div class="loading">載入失敗，請重新整理</div>';
  }
}

function renderAll(){
  renderArrange();
  renderToday();
  renderUpcoming();
  if(currentTab==='search') doSearch();
  if(currentTab==='stats') renderStats();
}

function sw(id, btn){
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('active');});
  document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active');});
  btn.classList.add('active');
  document.getElementById(id).classList.add('active');
  currentTab = id;
  if(id==='search') doSearch();
  if(id==='stats') renderStats();
}

function chDay(n){ viewDay=addD(viewDay,n); renderToday(); }

// ── 待安排
var arrangeTypeFilter = 'all';

function setArrangeTypeFilter(val, btn){
  arrangeTypeFilter = val;
  document.querySelectorAll('.filter-btn[data-group="arrange-type"]').forEach(function(b){
    b.classList.remove('active');
  });
  btn.classList.add('active');
  renderArrange();
}

function renderArrange(){
  var list = orders.filter(function(o){ return !o.shipDate && o.shipStatus!=='已出貨'; });
  var badge = document.getElementById('badge-arrange');
  if(list.length){ badge.textContent=list.length; badge.style.display=''; }
  else { badge.style.display='none'; }

  if(arrangeTypeFilter!=='all'){
    list = list.filter(function(o){ return o.type===arrangeTypeFilter; });
  }

  var el = document.getElementById('arrange-list');
  if(!list.length){
    el.innerHTML='<div class="empty-msg">'+(arrangeTypeFilter==='all'?'所有訂單都已安排出貨日 ✓':'目前沒有符合條件的訂單')+'</div>';
    return;
  }
  el.innerHTML = list.map(function(o){ return arrangeCard(o); }).join('');
}

var pendingDates = {};

// 手機原生日期選擇器點開時可能會先帶入「今天」並觸發 onchange，
// 所以這裡先暫存選擇的日期，顯示確認按鈕，等使用者按下確認才真正送出
function onDatePicked(rowIndex, val){
  if(!val) return;
  pendingDates[rowIndex] = val;
  var btn = document.getElementById('date-confirm-'+rowIndex);
  if(!btn) return;
  var d = parseD(val);
  var label = (d.getMonth()+1)+'/'+d.getDate();
  btn.textContent = '✓ 設為 '+label;
  btn.style.display = '';
}

async function confirmDate(rowIndex){
  var val = pendingDates[rowIndex];
  if(!val) return;
  await setDateVal(rowIndex, val);
}

async function setDateVal(rowIndex, val){
  if(!val) return;
  await fetch(API+'?action=setShipDate&rowIndex='+rowIndex+'&shipDate='+val);
  var o = orders.find(function(x){return x.rowIndex===rowIndex;});
  if(o) o.shipDate = val;
  delete pendingDates[rowIndex];
  renderAll();
}

function renderToday(){
  var vds = fmt(viewDay);
  document.getElementById('today-label').textContent = fmtDisplay(viewDay);
  var day = orders.filter(function(o){ return o.shipDate===vds; });
  var pu = day.filter(function(o){return o.type==='自取';});
  var de = day.filter(function(o){return o.type==='宅配';});
  var puB = pu.reduce(function(s,o){return s+o.qty;},0);
  var deB = de.reduce(function(s,o){return s+o.qty;},0);
  document.getElementById('s-pickup').textContent = puB+' 盒';
  document.getElementById('s-delivery').textContent = deB+' 盒';
  document.getElementById('s-total').textContent = (puB+deB)+' 盒';

  // 依篩選決定顯示哪些區塊
  var showPu = todayTypeFilter==='all' || todayTypeFilter==='自取';
  var showDe = todayTypeFilter==='all' || todayTypeFilter==='宅配';
  document.getElementById('sec-pickup-hd').style.display = showPu ? '' : 'none';
  document.getElementById('list-pickup').style.display = showPu ? '' : 'none';
  document.getElementById('sec-delivery-hd').style.display = showDe ? '' : 'none';
  document.getElementById('list-delivery').style.display = showDe ? '' : 'none';

  document.getElementById('list-pickup').innerHTML = pu.length ? pu.map(todayCard).join('') : '<div class="empty-msg">今天沒有自取</div>';
  document.getElementById('list-delivery').innerHTML = de.length ? de.map(todayCard).join('') : '<div class="empty-msg">今天沒有宅配</div>';

  // 全選/批次操作只作用於目前篩選後可見的訂單
  var visible = [];
  if(showPu) visible = visible.concat(pu);
  if(showDe) visible = visible.concat(de);
  todayRowIndexes = visible.map(function(o){return o.rowIndex;});

  // 換頁/換篩選時，只保留還存在的勾選
  var keep = new Set();
  selectedRows.forEach(function(r){ if(todayRowIndexes.indexOf(r)!==-1) keep.add(r); });
  selectedRows = keep;
  updateBatchBar();

  renderBigOverview();
}

var filterPay = 'all';
var filterShip = 'all';

function setFilter(group, val, btn){
  if(group==='pay') filterPay = val;
  if(group==='ship') filterShip = val;
  document.querySelectorAll('.filter-btn[data-group="'+group+'"]').forEach(function(b){
    b.classList.remove('active');
  });
  btn.classList.add('active');
  doSearch();
}

function doSearch(){
  var q = document.getElementById('search-input').value.trim();
  var el = document.getElementById('search-results');
  var sumEl = document.getElementById('unpaid-summary');
  var res = orders.filter(function(o){
    var matchQ = !q || o.name.includes(q) || o.phone.includes(q) || o.orderId.includes(q);
    var matchPay = filterPay==='all' ||
      (filterPay==='待匯款' && o.payStatus==='待匯款') ||
      (filterPay==='已收款' && o.paidAt);
    var matchShip = filterShip==='all' ||
      (filterShip==='待出貨' && !o.shippedAt) ||
      (filterShip==='已出貨' && o.shippedAt);
    return matchQ && matchPay && matchShip;
  });

  // ── 未收款總覽（依目前篩選結果計算）
  var unpaid = res.filter(function(o){return !o.paidAt;});
  if(!res.length){
    sumEl.innerHTML='';
  } else if(unpaid.length){
    var uBoxes = unpaid.reduce(function(s,o){return s+o.qty;},0);
    var uAmount = unpaid.reduce(function(s,o){return s+(o.totalAmount||o.amount||0);},0);
    sumEl.className = 'unpaid-summary';
    sumEl.innerHTML = '<div class="us-stats">'+
      '<span>🔴 未收款 <b>'+unpaid.length+'</b> 筆</span>'+
      '<span><b>'+uBoxes+'</b> 盒</span>'+
      '<span>NT$ <b>'+uAmount.toLocaleString()+'</b></span>'+
      '</div>';
  } else {
    sumEl.className = 'unpaid-summary none';
    sumEl.innerHTML = '✅ 目前篩選結果全部已收款';
  }

  if(!res.length){
    el.innerHTML='<div class="empty-msg">'+(q?'找不到「'+q+'」':'沒有符合條件的訂單')+'</div>';
    return;
  }
  el.innerHTML = res.map(function(o){
    var tags = typeTags(o);
    var note = o.note?'<div class="oc-note">📝 '+o.note+'</div>':'';
    var addr = o.type==='宅配'?'<div class="oc-info" style="font-size:11px">📦 '+o.address+'</div>':'';
    return '<div class="ocard">'+
      '<div class="oc-id">'+o.orderId+'</div>'+
      '<div class="oc-top"><div class="oc-name">'+o.name+'</div><div class="oc-boxes">'+o.qty+' 盒</div></div>'+
      '<div class="oc-tags">'+tags+'</div>'+
      '<div class="oc-info">'+(o.phone?o.phone+' · ':'')+o.amount+'元 · '+(o.shipDate?fmtDisplay(parseD(o.shipDate)):'尚未安排出貨日')+'</div>'+
      addr+note+
      '<div class="oc-info" style="margin-top:4px">'+
      (o.shippedAt?'🟠 已出貨 '+o.shippedAt:'🔲 未出貨')+' &nbsp; '+
      (o.paidAt?'🟢 已收款 '+o.paidAt:'🔲 未收款')+
      '</div></div>';
  }).join('');
}

function copyLabel(rowIndex){
  var o = orders.find(function(x){return x.rowIndex===rowIndex;});

  var d = o.shipDate ? (function(){

    '單號：' + o.orderId,
    '出貨日：' + d,
    sep,
    '寄：謝小姐 0937-331355',
    '苗栗縣公館鄉館東村和東街46號'
  ];
  var text = lines.join('\n');
  navigator.clipboard.writeText(text).then(function(){

function typeTags(o){
  var t = '<span class="tag '+(o.type==='自取'?'t-pickup':'t-delivery')+'">'+(o.type==='自取'?'🏪 自取':'🚛 宅配')+'</span>';
  if(o.payStatus==='已收款') t+=' <span class="tag t-paid">已收款</span>';
  else if(o.payStatus==='待匯款') t+=' <span class="tag t-unpaid">待匯款</span>';
  else if(o.type==='自取') t+=' <span class="tag t-cash">現場收款</span>';
  if(o.custType==='批發') t+=' <span class="tag t-wholesale">📦 批發</span>';
  return t;
}

// ── 統計分頁
function renderStats(){
  var orderCount = orders.length;
  var totalBoxes = orders.reduce(function(s,o){return s+o.qty;},0);

  var shipped = orders.filter(function(o){return o.shippedAt;});
  var unshipped = orders.filter(function(o){return !o.shippedAt;});
  var shippedBoxes = shipped.reduce(function(s,o){return s+o.qty;},0);
  var unshippedBoxes = unshipped.reduce(function(s,o){return s+o.qty;},0);
  var shipPct = totalBoxes>0 ? Math.round(shippedBoxes/totalBoxes*100) : 0;

  var paid = orders.filter(function(o){return o.paidAt;});
  var unpaid = orders.filter(function(o){return !o.paidAt;});
  var paidAmount = paid.reduce(function(s,o){return s+(o.totalAmount||o.amount||0);},0);
  var unpaidAmount = unpaid.reduce(function(s,o){return s+(o.totalAmount||o.amount||0);},0);
  var totalAmount = paidAmount+unpaidAmount;
  var paidPct = totalAmount>0 ? Math.round(paidAmount/totalAmount*100) : 0;

  var pu = orders.filter(function(o){return o.type==='自取';});
  var de = orders.filter(function(o){return o.type==='宅配';});
  var puBoxes = pu.reduce(function(s,o){return s+o.qty;},0);
  var deBoxes = de.reduce(function(s,o){return s+o.qty;},0);
  var typeTotal = puBoxes+deBoxes;
  var puPct = typeTotal>0 ? Math.round(puBoxes/typeTotal*100) : 0;
  var dePct = typeTotal>0 ? 100-puPct : 0;

  document.getElementById('st-order-count').textContent = orderCount;
  document.getElementById('st-total-boxes').textContent = totalBoxes;

  document.getElementById('st-shipped-boxes').textContent = shippedBoxes+' 盒（'+shipped.length+'筆）';
  document.getElementById('st-unshipped-boxes').textContent = unshippedBoxes+' 盒（'+unshipped.length+'筆）';
  document.getElementById('st-ship-fill').style.width = shipPct+'%';
  document.getElementById('st-ship-sub').textContent = '已出貨佔 '+shipPct+'%';

  document.getElementById('st-paid-amount').textContent = 'NT$'+paidAmount.toLocaleString();
  document.getElementById('st-unpaid-amount').textContent = 'NT$'+unpaidAmount.toLocaleString();
  document.getElementById('st-paid-fill').style.width = paidPct+'%';
  document.getElementById('st-paid-sub').textContent = '已收款佔總額 '+paidPct+'%（'+paid.length+'/'+orderCount+' 筆）';

  document.getElementById('st-pickup').textContent = pu.length+' 筆 / '+puBoxes+' 盒';
  document.getElementById('st-delivery').textContent = de.length+' 筆 / '+deBoxes+' 盒';
  document.getElementById('st-pickup-fill').style.width = puPct+'%';
  document.getElementById('st-delivery-fill').style.width = dePct+'%';

  document.getElementById('st-stock-total').textContent = totalStock+' 盒';
  document.getElementById('st-stock-sold').textContent = soldStock+' 盒';
  document.getElementById('st-stock-remain').textContent = remainStock+' 盒';
  var stockPct = totalStock>0 ? Math.round(soldStock/totalStock*100) : 0;
  document.getElementById('st-stock-fill').style.width = stockPct+'%';
}

function printAll(){
  var unshipped = orders.filter(function(o){ return !o.shippedAt; });
  if(!unshipped.length){ alert('目前沒有未出貨訂單！'); return; }

  // 依預計出貨日排序（無日期排最後）
  unshipped.sort(function(a,b){
    if(!a.shipDate && !b.shipDate) return 0;
    if(!a.shipDate) return 1;
    if(!b.shipDate) return -1;
    return a.shipDate.localeCompare(b.shipDate);
  });

  var now = new Date().toLocaleString('zh-TW',{timeZone:'Asia/Taipei'});
  var total = unshipped.reduce(function(s,o){return s+o.qty;},0);
  var puTotal = unshipped.filter(function(o){return o.type==='自取';}).reduce(function(s,o){return s+o.qty;},0);
  var deTotal = unshipped.filter(function(o){return o.type==='宅配';}).reduce(function(s,o){return s+o.qty;},0);

  // 依日期分組
  var groups = {};
  var noDate = [];
  unshipped.forEach(function(o){
    if(!o.shipDate){ noDate.push(o); return; }
    if(!groups[o.shipDate]) groups[o.shipDate] = [];
    groups[o.shipDate].push(o);
  });

  function pickupRows(list){
    return list.map(function(o){
      return '<tr>'+
        '<td class="chk">☐</td>'+
        '<td><b>'+o.name+'</b></td>'+
        '<td><b>'+(o.name||'同左')+'</b></td>'+
        '<td><span class="n2">'+(o.phone||'—')+'</span></td>'+
        '<td style="text-align:center;font-weight:700">'+o.qty+'</td>'+
        '<td>'+(o.payStatus||'現場收款')+'</td>'+
        '<td>'+(o.note||'')+'</td>'+
        '<td class="chk">☐</td>'+
        '</tr>';
    }).join('');
  }

  function deliveryRows(list){
    return list.map(function(o){
      return '<tr>'+
        '<td class="chk">☐</td>'+
        '<td><b>'+o.name+'</b></td>'+
        '<td><b>'+(o.name||'同左')+'</b></td>'+
        '<td><span class="n2">'+(o.phone||'—')+'</span></td>'+
        '<td style="text-align:center;font-weight:700">'+o.qty+'</td>'+
        '<td>'+(o.payStatus||'待匯款')+'</td>'+
        '<td style="font-size:13px">'+(o.address||'')+'</td>'+
        '<td>'+(o.note||'')+'</td>'+
        '<td class="chk">☐</td>'+
        '</tr>';
    }).join('');
  }

  function section(list, label){
    var pu = list.filter(function(o){return o.type==='自取';});
    var de = list.filter(function(o){return o.type==='宅配';});
    var puB = pu.reduce(function(s,o){return s+o.qty;},0);
    var deB = de.reduce(function(s,o){return s+o.qty;},0);
    var html = '<div class="ps-day">'+label+'　共 '+(puB+deB)+' 盒（自取 '+puB+' ／宅配 '+deB+'）</div>';
    if(pu.length){
      html += '<div class="ps-type">🏪 自取（'+puB+' 盒）</div>';
      html += '<table>'+
        '<tr><th class="chk">出</th><th style="width:12%">訂購人</th><th style="width:12%">收件人</th><th style="width:11%">電話</th><th style="width:5%;text-align:center">盒</th><th style="width:10%">收款</th><th>備註</th><th class="chk">收</th></tr>'+
        pickupRows(pu)+'</table>';
    }
    if(de.length){
      html += '<div class="ps-type" style="margin-top:8px">🚛 宅配（'+deB+' 盒）</div>';
      html += '<table>'+
        '<tr><th class="chk">出</th><th style="width:10%">訂購人</th><th style="width:10%">收件人</th><th style="width:10%">電話</th><th style="width:4%;text-align:center">盒</th><th style="width:8%">收款</th><th style="width:22%">地址</th><th>備註</th><th class="chk">收</th></tr>'+
        deliveryRows(de)+'</table>';
    }
    return html;
  }

  var body = '';
  // 依日期排序的群組
  Object.keys(groups).sort().forEach(function(ds){
    var d = new Date(ds+'T00:00:00');
    var wd2 = ['日','一','二','三','四','五','六'][d.getDay()];
    var lbl = (d.getMonth()+1)+'/'+d.getDate()+'（'+wd2+'）';
    body += section(groups[ds], '📅 '+lbl);
  });
  // 未安排
  if(noDate.length){
    body += section(noDate, '⚠️ 尚未安排出貨日');
  }

  document.getElementById('print-sheet').innerHTML =
    '<h2>🍊 砂糖橘未出貨清單</h2>'+
    '<div class="ps-meta">列印時間：'+now+'　共 '+unshipped.length+' 筆　'+total+' 盒（自取'+puTotal+'／宅配'+deTotal+'）</div>'+
    body;

  window.print();
}

loadOrders();
</script>
</body>
</html>
